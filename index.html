<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>كتالوج المنتجات | REVORA</title>
    <link rel="icon" type="image/png" href="revora 500x 500.png" />
    <link
      rel="preload"
      as="image"
      href="image/mobile/cover%201.webp"
      media="(max-width: 900px)"
    />
    <link
      rel="preload"
      as="image"
      href="image/desktop/cover%201.webp"
      media="(min-width: 901px)"
    />
    <link rel="stylesheet" href="css.css?v=20260402-2" />
    <script src="js.optimized.js?v=20260402-1" defer></script>
  </head>
  <body>
    <main class="experience">
      <section class="book-stage" aria-label="Interactive catalog book">
        <button
          class="nav-arrow nav-arrow-prev"
          id="prevButton"
          type="button"
          aria-label="الصفحة السابقة"
        >
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M14.5 6.5 9 12l5.5 5.5"></path>
            <path d="M10 12h6.5"></path>
          </svg>
        </button>

        <div class="book-frame">
          <div class="book-container" id="book">
            <div class="page" id="left-under"></div>
            <div class="page" id="right-under"></div>

            <div class="page front-page" id="left-front"></div>
            <div class="page front-page" id="right-front"></div>
            <div
              class="page transition-page"
              id="transitionPage"
              aria-hidden="true"
            ></div>

            <div class="flap" id="flap">
              <div class="flap-content" id="flapContent"></div>
              <div class="fold-gradient" id="foldGradient"></div>
            </div>
          </div>
        </div>

        <button
          class="nav-arrow nav-arrow-next"
          id="nextButton"
          type="button"
          aria-label="الصفحة التالية"
        >
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M9.5 6.5 15 12l-5.5 5.5"></path>
            <path d="M14 12H7.5"></path>
          </svg>
        </button>
      </section>

      <div class="viewer-toolbar" aria-label="أدوات العرض">
        <button
          class="display-toggle"
          id="viewToggle"
          type="button"
          aria-label="عرض صفحة واحدة"
          title="عرض صفحة واحدة"
        >
          <span class="layout-icon layout-icon-single" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <rect x="6" y="4" width="12" height="16" rx="2"></rect>
              <line x1="9" y1="8" x2="15" y2="8"></line>
              <line x1="9" y1="12" x2="15" y2="12"></line>
              <line x1="9" y1="16" x2="13" y2="16"></line>
            </svg>
          </span>
          <span class="layout-icon layout-icon-spread" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4.5 6.5A2.5 2.5 0 0 1 7 4h3.5a3.5 3.5 0 0 1 1.5.34V19.5a3.5 3.5 0 0 0-1.5-.34H7a2.5 2.5 0 0 0-2.5 2.5z"></path>
              <path d="M19.5 6.5A2.5 2.5 0 0 0 17 4h-3.5a3.5 3.5 0 0 0-1.5.34V19.5a3.5 3.5 0 0 1 1.5-.34H17a2.5 2.5 0 0 1 2.5 2.5z"></path>
            </svg>
          </span>
        </button>

        <div class="spread-status" aria-live="polite">
          <span class="status-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M5 5.5A2.5 2.5 0 0 1 7.5 3H12v18H7.5A2.5 2.5 0 0 0 5 23z"></path>
              <path d="M19 5.5A2.5 2.5 0 0 0 16.5 3H12v18h4.5A2.5 2.5 0 0 1 19 23z"></path>
            </svg>
          </span>
          <span class="spread-status-value" id="spreadStatus"></span>
        </div>

        <div class="zoom-controls" aria-label="أدوات التكبير">
          <button
            class="zoom-button"
            id="zoomOutButton"
            type="button"
            aria-label="تصغير"
            title="تصغير"
          >
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="11" cy="11" r="6.5"></circle>
              <line x1="8.5" y1="11" x2="13.5" y2="11"></line>
              <line x1="16" y1="16" x2="20" y2="20"></line>
            </svg>
          </button>
          <span class="zoom-value" id="zoomValue">100%</span>
          <button
            class="zoom-button"
            id="zoomInButton"
            type="button"
            aria-label="تكبير"
            title="تكبير"
          >
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="11" cy="11" r="6.5"></circle>
              <line x1="11" y1="8.5" x2="11" y2="13.5"></line>
              <line x1="8.5" y1="11" x2="13.5" y2="11"></line>
              <line x1="16" y1="16" x2="20" y2="20"></line>
            </svg>
          </button>
        </div>
      </div>
    </main>

    <a
      class="whatsapp-float"
      href="https://wa.me/201022150675"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="ابدأ محادثة واتساب"
      title="ابدأ محادثة واتساب"
    >
      <span class="whatsapp-float__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path d="M12 3.2a8.8 8.8 0 0 0-7.5 13.4L3.2 21l4.6-1.2A8.8 8.8 0 1 0 12 3.2Z"></path>
          <path d="M9.4 8.2c-.2-.4-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.4-.2.3-.8.9-.8 2.1s.8 2.4.9 2.5c.1.2 1.7 2.8 4.2 3.8 2 .8 2.4.7 2.8.6.4-.1 1.3-.5 1.5-1 .2-.5.2-.9.1-1-.1-.1-.3-.2-.7-.4l-1.2-.6c-.3-.1-.5-.2-.7.2l-.5.6c-.2.2-.3.2-.6.1-.4-.2-1.5-.6-2.8-1.8-1-1-1.7-2.1-1.9-2.4-.2-.3 0-.4.1-.6l.4-.5c.1-.1.2-.3.3-.5.1-.2 0-.4 0-.6l-.5-1.2Z"></path>
        </svg>
      </span>
    </a>

    <div class="rotate-overlay" id="rotateOverlay">
      <div class="rotate-prompt">
        <svg class="rotate-icon" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <rect x="28" y="8" width="44" height="84" rx="8" />
          <line x1="42" y1="80" x2="58" y2="80" />
        </svg>
        <p class="rotate-text">قم بتدوير الهاتف للعرض الأفضل</p>
        <button class="rotate-dismiss" id="rotateDismiss" type="button">متابعة على أي حال</button>
      </div>
    </div>
  </body>
</html>
